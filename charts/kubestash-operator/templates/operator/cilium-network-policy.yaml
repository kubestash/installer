{{- if eq "true" (include "security.useCiliumNetworkPolicy" .) }}
# Allow the operator to reach the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "kubestash-operator.fullname" . }}-operator-egress-apiserver
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "kubestash-operator.selectorLabels" . | nindent 6 }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
---
# Allow the operator to resolve DNS.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "kubestash-operator.fullname" . }}-operator-egress-dns
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "kubestash-operator.selectorLabels" . | nindent 6 }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: '*'
---
# Allow the operator to reach backup storage (cloud over HTTPS, in-cluster MinIO).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "kubestash-operator.fullname" . }}-operator-egress-storage
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "kubestash-operator.selectorLabels" . | nindent 6 }}
  egress:
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: minio
    toPorts:
    - ports:
      - port: "9000"
        protocol: TCP
---
# Allow backup/restore pods to reach the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: {{ include "kubestash-operator.fullname" . }}-backup-kube-apiserver
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/managed-by: kubestash.com
  egress:
  - toEntities:
    - kube-apiserver
{{- end }}
