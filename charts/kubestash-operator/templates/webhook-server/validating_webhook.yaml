{{ template "kubestash-operator.prepare-certs" $ }}

{{- if .Values.apiserver.enableValidatingWebhook }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "kubestash-operator.fullname" . }}
  {{- $caInject := include "kubestash-operator.webhook-ca-inject-annotations" . }}
  labels:
    {{- include "kubestash-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- if $caInject }}
    {{- $caInject | nindent 4 }}
    {{- end }}
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-storage-kubestash-com-v1alpha1-backupstorage
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: vbackupstorage.kb.io
    rules:
      - apiGroups:
          - storage.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - backupstorages
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-storage-kubestash-com-v1alpha1-repository
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: vrepository.kb.io
    rules:
      - apiGroups:
          - storage.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - repositories
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-storage-kubestash-com-v1alpha1-retentionpolicy
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: vretentionpolicy.kb.io
    rules:
      - apiGroups:
          - storage.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - retentionpolicies
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-core-kubestash-com-v1alpha1-backupbatch
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: vbackupbatch.kb.io
    rules:
      - apiGroups:
          - core.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - backupbatches
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-core-kubestash-com-v1alpha1-backupblueprint
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: vbackupblueprint.kb.io
    rules:
      - apiGroups:
          - core.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
