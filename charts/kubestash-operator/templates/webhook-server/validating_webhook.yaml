        namespace: {{ .Release.Namespace }}
        path: /validate-core-kubestash-com-v1alpha1-hooktemplate
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: vhooktemplate.kb.io
