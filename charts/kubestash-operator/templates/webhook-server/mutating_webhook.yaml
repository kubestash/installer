{{ template "kubestash-operator.prepare-certs" $ }}

{{- if .Values.apiserver.enableMutatingWebhook }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kubestash-operator.fullname" . }}
  {{- $caInject := include "kubestash-operator.webhook-ca-inject-annotations" . }}
  labels:
    {{- include "kubestash-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- if $caInject }}
    {{- $caInject | nindent 4 }}
    {{- end }}
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-storage-kubestash-com-v1alpha1-backupstorage
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: mbackupstorage.kb.io
    rules:
      - apiGroups:
          - storage.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - backupstorages
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-storage-kubestash-com-v1alpha1-retentionpolicy
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: mretentionpolicy.kb.io
    rules:
      - apiGroups:
          - storage.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - retentionpolicies
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-core-kubestash-com-v1alpha1-backupblueprint
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: mbackupblueprint.kb.io
    rules:
      - apiGroups:
          - core.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - backupblueprints
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-core-kubestash-com-v1alpha1-backupconfiguration
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: mbackupconfiguration.kb.io
    rules:
      - apiGroups:
          - core.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - backupconfigurations
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubestash-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-core-kubestash-com-v1alpha1-hooktemplate
{{- include "kubestash-operator.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: mhooktemplate.kb.io
    rules:
      - apiGroups:
          - core.kubestash.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - hooktemplates
    sideEffects: None
{{ end }}
